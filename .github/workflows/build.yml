name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Release)
        run: cargo build --release

      - name: Prepare release bundle
        run: |
          New-Item -Path "release-bundle/assets/fonts" -ItemType Directory -Force
          Copy-Item "target/release/escpos_emulator.exe" "release-bundle/"
          Copy-Item "assets/fonts/*.ttf" "release-bundle/assets/fonts/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: escpos_emulator-windows-x86_64
          path: release-bundle/
          retention-days: 90
